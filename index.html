<!doctype html>
<html lang="es">

  <meta charset="utf-8" />

  <meta name="description" content="Bicicletas y electosamokатas" />
  <meta name="viewport" content="width=device-width, initial-scale=0.5" />

  <!-- Schema.org JSON данные -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "It's Better By Bike! Rental & Delivery",
      "description": "Alquiler y entrega de bicicletas a tu lugar de vacaciones",
      "url": "https://itsbetterbybike.es",
      "priceRange": "€349-€549",
      "offers": [{
        "@type": "Offer",
        "itemOffered": {
          "@type": "Product",
          "name": "Bicicleta urbana",
          "image": "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=500",
          "price": "549",
          "priceCurrency": "EUR"
        }
      }, {
        "@type": "Offer",
        "itemOffered": {
          "@type": "Product",
          "name": "Electrosamokat",
          "image": "",
          "price": "349",
          "priceCurrency": "EUR"
        }
      }]
    }

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { margin: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* 🎨 Колеса как на rentabikealicante.com */
    .wheel-top {
      position: absolute;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 120px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.3) 70%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow:
              0 -20px 40px rgba(255,255,255,0.4),
              inset 0 10px 20px rgba(0,0,0,0.1);
      z-index: 2;
    }
    .wheel-bottom {
      position: absolute;
      bottom: -60px; right: 10%;
      width: 140px; height: 140px;
      background: radial-gradient(circle at 70% 70%, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.2) 70%);
      border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      box-shadow:
              0 20px 40px rgba(0,0,0,0.2),
              inset 0 -10px 20px rgba(0,0,0,0.1);
      z-index: 2;
    }

    .glass {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .hero-bg {
      position: relative;
      background: linear-gradient(135deg, rgba(15,23,42,0.85) 0%, rgba(30,41,59,0.95) 100%),
      url('bike_mount.png');
      background-size: cover; background-position: center;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      color: white; border: none; border-radius: 50px; font-weight: 700;
      padding: 18px 36px; font-size: 16px; cursor: pointer;
      box-shadow: 0 20px 40px rgba(59,130,246,0.4);
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      position: relative; overflow: hidden;
    }
    .btn-primary:hover {
      transform: translateY(-3px); box-shadow: 0 30px 60px rgba(59,130,246,0.5);
    }
    .btn-primary::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }
    .btn-primary:hover::before { left: 100%; }

    .btn-secondary {
      background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50px; padding: 16px 32px; font-weight: 600; transition: all 0.3s ease;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.3); }

    .section-container {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .bike-image {
      height: 320px;
      background-size: cover;
      background-position: center;
      position: relative;
      transition: all 0.4s ease;
    }

    .product-card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      overflow: hidden;

      transform: translateY(-16px) scale(1.02);
      box-shadow: 0 50px 100px rgba(0,0,0,0.2);

                              </div>
                              <button

</script>
</body>
</html>
