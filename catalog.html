<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>BikeStore - Catálogo completo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 50%, #fca5a5 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .cart-badge {
            position: absolute; top: -6px; right: -6px;
            background: #ef4444; color: white; border-radius: 50%;
            width: 22px; height: 22px; font-size: 11px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
        }
        .filter-chip {
            padding: 12px 24px; border-radius: 25px; border: none;
            font-weight: 600; cursor: pointer; white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            background: rgba(255,255,255,0.7);
        }
        .filter-chip.active {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white; transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(239,68,68,0.4);
        }
        .bike-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .bike-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 40px 80px rgba(0,0,0,0.25);
        }
        @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        .float { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const { useState } = React;

    const Catalog = () => {
        const [cartCount, setCartCount] = useState(0);
        const [filter, setFilter] = useState('all');

        const bikes = [
            {id:1,brand:'KROSS',name:'Trans Hybrid 5.0',type:'e-bike',price:'2.499€',img:'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=400'},
            {id:2,brand:'KROSS',name:'City Urban 2.0',type:'city',price:'749€',img:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400'},
            {id:3,brand:'KROSS',name:'Level 6.0',type:'mtb',price:'1.199€',img:'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400'},
            {id:4,brand:'KROSS',name:'Hexagon 4.0',type:'mtb',price:'599€',img:'https://images.unsplash.com/photo-1558618047-3c8c76bd89e8?w=400'},
            {id:5,brand:'KROSS',name:'Evado 5.0',type:'trekking',price:'889€',img:'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=400'},
            {id:6,brand:'KROSS',name:'Flex e-City',type:'e-bike',price:'1.399€',img:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400'},
            {id:7,brand:'KROSS',name:'Dust 2.0',type:'city',price:'429€',img:'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=400'},
            {id:8,brand:'KROSS',name:'Hexagon CF 3',type:'mtb',price:'999€',img:'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400'},
            {id:9,brand:'KROSS',name:'Trans Hybrid 2.0',type:'e-bike',price:'1.899€',img:'https://images.unsplash.com/photo-1558618047-3c8c76bd89e8?w=400'}
        ];

        const filteredBikes = filter === 'all' ? bikes : bikes.filter(b => b.type === filter);

        return (
            <>
                {/* Header */}
                <header className="header glass" style={{padding:'24px 40px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'24px'}}>
                        <a href="welcome.html" style={{
                            color:'#1e293b', textDecoration:'none', fontWeight:600, fontSize:'18px',
                            padding:'12px 20px', borderRadius:'16px', background:'rgba(255,255,255,0.5)',
                            transition:'all 0.3s ease', display:'flex', alignItems:'center', gap:'8px'
                        }}>
                            <i className="fas fa-arrow-left"></i>
                            Catálogos
                        </a>
                        <a href="landing.html" style={{
                            color:'#dc2626', textDecoration:'none', fontWeight:600, fontSize:'16px'
                        }}>
                            <i className="fas fa-fire" style={{marginRight:'8px'}}></i>
                            Ofertas especiales
                        </a>
                    </div>

                    <div style={{display:'flex',gap:'16px'}}>
                        <button style={{
                            width:'56px',height:'56px',borderRadius:'16px',border:'1px solid rgba(0,0,0,0.1)',
                            background:'rgba(255,255,255,0.7)',cursor:'pointer',transition:'all 0.3s ease',
                            display:'flex',alignItems:'center',justifyContent:'center'
                        }}>
                            <i className="fas fa-user" style={{fontSize:'20px',color:'#1e293b'}}></i>
                        </button>
                        <button style={{
                            position:'relative',width:'56px',height:'56px',borderRadius:'16px',
                            border:'1px solid rgba(0,0,0,0.1)',background:'rgba(255,255,255,0.7)',
                            cursor:'pointer',transition:'all 0.3s ease',display:'flex',
                            alignItems:'center',justifyContent:'center'
                        }}>
                            <i className="fas fa-shopping-cart" style={{fontSize:'20px',color:'#1e293b'}}></i>
                            {cartCount > 0 && <div className="cart-badge">{cartCount}</div>}
                        </button>
                    </div>
                </header>

                {/* Filters */}
                <div className="glass" style={{padding:'24px 40px',margin:'0 40px',marginTop:'-20px',borderRadius:'0 0 24px 24px'}}>
                    <div style={{display:'flex',gap:'16px',overflowX:'auto',paddingBottom:'12px'}}>
                        {[
                            {key:'all',label:'Todos',count:bikes.length},
                            {key:'e-bike',label:'Eléctricas',count:bikes.filter(b=>b.type==='e-bike').length},
                            {key:'city',label:'Urbanas',count:bikes.filter(b=>b.type==='city').length},
                            {key:'mtb',label:'MTB',count:bikes.filter(b=>b.type==='mtb').length},
                            {key:'trekking',label:'Trekking',count:bikes.filter(b=>b.type==='trekking').length}
                        ].map(f => (
                            <button
                                key={f.key}
                                className={`filter-chip ${filter === f.key ? 'active' : ''}`}
                                onClick={()=>setFilter(f.key)}
                                style={{marginRight:'12px'}}
                            >
                                {f.label} <span style={{opacity:0.7}}>({f.count})</span>
                            </button>
                        ))}
                    </div>
                </div>

                {/* Results counter */}
                <div style={{padding:'0 40px 20px',color:'#1e293b'}}>
                    <div style={{fontSize:'15px',opacity:0.8}}>
                        Mostrando {filteredBikes.length} de {bikes.length} bicicletas
                    </div>
                </div>

                {/* Bike Grid */}
                <div style={{
                    padding:'40px',maxWidth:'1600px',margin:'0 auto',
                    display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(380px,1fr))',gap:'32px'
                }}>
                    {filteredBikes.map(bike => (
                        <div key={bike.id} className="bike-card float" style={{cursor:'pointer'}}>
                            <div style={{
                                height:'280px',background:`linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.2)),url(${bike.img})`,
                                backgroundSize:'cover',backgroundPosition:'center'
                            }}></div>
                            <div style={{padding:'32px'}}>
                                <div style={{
                                    fontSize:'13px',color:'#dc2626',fontWeight:700,textTransform:'uppercase',
                                    letterSpacing:'1px',marginBottom:'16px',background:'rgba(239,68,68,0.1)',
                                    padding:'6px 12px',borderRadius:'20px',display:'inline-block',fontSize:'12px'
                                }}>
                                    {bike.brand}
                                </div>
                                <h3 style={{
                                    fontSize:'28px',fontWeight:900,color:'#1e293b',marginBottom:'12px',
                                    lineHeight:1.3
                                }}>
                                    {bike.name}
                                </h3>
                                <div style={{
                                    fontSize:'36px',fontWeight:900,color:'#dc2626',marginBottom:'28px'
                                }}>
                                    {bike.price}
                                </div>
                                <button onClick={()=>setCartCount(c=>c+1)} style={{
                                    width:'100%',height:'60px',borderRadius:'20px',border:'none',
                                    background:'linear-gradient(135deg,#ef4444,#dc2626)',color:'white',
                                    fontSize:'18px',fontWeight:800,cursor:'pointer',
                                    transition:'all 0.4s cubic-bezier(0.4,0,0.2,1)'
                                }}
                                        onMouseOver={e=>{
                                            e.target.style.transform='translateY(-4px) scale(1.02)';
                                            e.target.style.boxShadow='0 20px 40px rgba(239,68,68,0.5)';
                                        }}
                                        onMouseOut={e=>{
                                            e.target.style.transform='translateY(0) scale(1)';
                                            e.target.style.boxShadow='none';
                                        }}>
                                    <i className="fas fa-bolt" style={{marginRight:'12px',fontSize:'20px'}}></i>
                                    Comprar en 1 clic
                                </button>
                            </div>
                        </div>
                    ))}
                </div>

                {/* CTA bottom */}
                {filteredBikes.length === 0 && (
                    <div style={{textAlign:'center',padding:'80px 40px'}}>
                        <i className="fas fa-search" style={{fontSize:'64px',color:'#94a3b8',marginBottom:'24px'}}></i>
                        <h3 style={{fontSize:'28px',color:'#1e293b',marginBottom:'12px'}}>No hay resultados</h3>
                        <p style={{fontSize:'18px',color:'#64748b',marginBottom:'32px'}}>Prueba con otro filtro</p>
                        <button onClick={()=>setFilter('all')} style={{
                            padding:'16px 40px',background:'linear-gradient(135deg,#3b82f6,#1d4ed8)',
                            color:'white',border:'none',borderRadius:'50px',fontSize:'18px',fontWeight:700
                        }}>
                            Mostrar todos
                        </button>
                    </div>
                )}
            </>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<Catalog />);
</script>
</body>
</html>
